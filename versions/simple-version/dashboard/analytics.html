<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpertAI Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 bg-slate-900 text-white min-h-screen p-4 flex flex-col shadow-2xl">
            <h1 class="text-3xl font-extrabold mb-10 text-blue-400 text-center">ExpertAI</h1>
            <nav class="flex-grow">
                <a href="/" class="block py-3 px-6 hover:bg-slate-800 rounded-lg mb-2 transition-all">Dashboard</a>
                <a href="/apikeys" class="block py-3 px-6 hover:bg-slate-800 rounded-lg mb-2 transition-all">API Keys</a>
                <a href="/logs" class="block py-3 px-6 hover:bg-slate-800 rounded-lg mb-2 transition-all">Logs</a>
                <a href="/analytics" class="block py-3 px-6 bg-slate-800 rounded-lg mb-2 transition-all">Analytics</a>
                <a href="/settings" class="block py-3 px-6 hover:bg-slate-800 rounded-lg mb-2 transition-all">Settings</a>
                <a href="/tools" class="block py-2 px-4 hover:bg-slate-800 rounded mb-2">Tools</a>
            </nav>
        </div>

        <!-- Content -->
        <div class="flex-1 p-10 bg-gray-50">
            <header class="mb-12 flex justify-between items-center">
                <h2 class="text-4xl font-extrabold text-gray-800 tracking-tight">System Analytics</h2>
                <div class="text-sm font-semibold text-gray-500 bg-white px-4 py-2 rounded-full shadow-inner">Historical Performance Metrics</div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 transition hover:shadow-2xl">
                    <h3 class="text-2xl font-bold mb-6 text-gray-700">Daily Requests</h3>
                    <canvas id="requestsChart" height="200"></canvas>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 transition hover:shadow-2xl">
                    <h3 class="text-2xl font-bold mb-6 text-gray-700">Token Usage Breakdown</h3>
                    <canvas id="tokensChart" height="200"></canvas>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100 transition hover:shadow-2xl col-span-1 md:col-span-2">
                    <h3 class="text-2xl font-bold mb-6 text-gray-700">Response Latency (ms)</h3>
                    <canvas id="latencyChart" height="100"></canvas>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/analytics.js"></script>
</body>
</html>
