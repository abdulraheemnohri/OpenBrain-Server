<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpertAI Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 bg-slate-900 text-white min-h-screen p-4 flex flex-col shadow-2xl">
            <h1 class="text-3xl font-extrabold mb-10 text-blue-400 text-center">ExpertAI</h1>
            <nav class="flex-grow">
                <a href="/" class="block py-3 px-6 hover:bg-slate-800 rounded-lg mb-2 transition-all">Dashboard</a>
                <a href="/apikeys" class="block py-3 px-6 hover:bg-slate-800 rounded-lg mb-2 transition-all">API Keys</a>
                <a href="/logs" class="block py-3 px-6 hover:bg-slate-800 rounded-lg mb-2 transition-all">Logs</a>
                <a href="/analytics" class="block py-3 px-6 hover:bg-slate-800 rounded-lg mb-2 transition-all">Analytics</a>
                <a href="/settings" class="block py-3 px-6 bg-slate-800 rounded-lg mb-2 transition-all">Settings</a>
                <a href="/tools" class="block py-2 px-4 hover:bg-slate-800 rounded mb-2">Tools</a>
            </nav>
        </div>

        <!-- Content -->
        <div class="flex-1 p-10 bg-gray-50">
            <header class="mb-12 flex justify-between items-center">
                <h2 class="text-4xl font-extrabold text-gray-800 tracking-tight">System Settings</h2>
                <div class="text-sm font-semibold text-gray-500 bg-white px-4 py-2 rounded-full shadow-inner">Configure ExpertAI Environment</div>
            </header>

            <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-10 max-w-4xl mx-auto transition hover:shadow-2xl">
                <div class="mb-10 pb-10 border-b border-gray-100">
                    <h3 class="text-2xl font-bold mb-8 text-gray-700">Model Configuration</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-3 uppercase tracking-wide">Default Model</label>
                            <input type="text" value="Qwen-3.5-27B" class="w-full bg-gray-50 border border-gray-300 p-4 rounded-xl text-gray-700 font-medium focus:ring-2 focus:ring-blue-400 transition" disabled>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-3 uppercase tracking-wide">Quantization</label>
                            <input type="text" value="GPTQ Int4" class="w-full bg-gray-50 border border-gray-300 p-4 rounded-xl text-gray-700 font-medium focus:ring-2 focus:ring-blue-400 transition" disabled>
                        </div>
                    </div>
                </div>

                <div class="mb-10 pb-10 border-b border-gray-100">
                    <h3 class="text-2xl font-bold mb-8 text-gray-700">Security & Performance</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-3 uppercase tracking-wide">Global Rate Limit</label>
                            <input type="number" value="1000" class="w-full bg-white border border-gray-300 p-4 rounded-xl text-gray-700 font-medium focus:ring-2 focus:ring-blue-400 transition shadow-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-3 uppercase tracking-wide">Token Limit</label>
                            <input type="number" value="2048" class="w-full bg-white border border-gray-300 p-4 rounded-xl text-gray-700 font-medium focus:ring-2 focus:ring-blue-400 transition shadow-sm">
                        </div>
                    </div>
                </div>

                <div class="mb-10">
                    <h3 class="text-2xl font-bold mb-8 text-gray-700">Installed Tools & Plugins</h3>
                    <div id="toolsList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Tools will be listed here -->
                    </div>
                </div>

                <div class="flex justify-end">
                    <button class="bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-4 px-10 rounded-xl shadow-lg transition-all transform hover:-translate-y-1 active:translate-y-0">Save All Changes</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/js/settings.js"></script>
</body>
</html>
